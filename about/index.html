<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>about | yawaineko</title>
    <meta
      name="description"
      content="やわいねこの記録を静かにまとめた、白い余白のある個人サイト。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="site-title" href="../">yawaineko</a>
      <button
        class="menu-toggle"
        type="button"
        aria-expanded="false"
        aria-controls="site-nav"
      >
        menu
      </button>
      <nav id="site-nav" class="site-nav" aria-label="ページ内リンク">
        <a class="is-active" href="../about/">about</a>
        <a href="../links/">links</a>
        <a href="../contact/">contact</a>
        <a href="../guideline/">guideline</a>
      </nav>
    </header>

    <main class="page">
      <section class="section subpage-intro" data-reveal>
        <h1 class="section-label">about</h1>
      </section>

      <section class="section poem-layout subpage-section">
        <div class="poem-row poem-row-top" data-reveal>
          <div class="mini-scene mini-scene-left">
            <img
              class="mini-photo"
              src="../assets/scene-door.png"
              alt="木漏れ日が差し込む白い壁と扉"
            />
            <div class="mini-overlay"></div>
          </div>
          <p class="poem">
            こもれびがほほえむ ,
            <br />
            そんなばしょ .
          </p>
        </div>

        <div class="poem-row poem-row-bottom" data-reveal>
          <p class="poem">
            わたし , やわいは ,
            <br />
            ここにいます .
          </p>
          <div class="mini-scene mini-scene-right">
            <img
              class="mini-photo"
              src="../assets/scene-wide.png"
              alt="木と白い中庭の風景"
            />
            <div class="mini-overlay"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="../script.js"></script>
  </body>
</html>
